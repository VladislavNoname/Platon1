{% extends 'mainapp/base.html' %}

{% block title %}Новая заявка — Platon CRM{% endblock %}

{% block content %}
<div style="max-width: 640px; margin: 0 auto;">
    <h1 style="font-size: 22px; font-weight: 700; margin-bottom: 20px;">Создание новой заявки</h1>

    <div class="card">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_topic">Тема заявки *</label>
                <input type="text" name="topic" id="id_topic" class="form-control" required maxlength="255" placeholder="Кратко опишите суть заявки">
            </div>

            <div class="form-group">
                <label for="id_description">Описание *</label>
                <textarea name="description" id="id_description" class="form-control" rows="5" required placeholder="Подробно опишите проблему или задачу"></textarea>
            </div>

            <div class="form-group">
                <label for="id_priority">Приоритет</label>
                <select name="priority" id="id_priority" class="form-control">
                    <option value="low">Низкий</option>
                    <option value="medium" selected>Средний</option>
                    <option value="high">Высокий</option>
                    <option value="critical">Критический</option>
                </select>
            </div>

            <div class="form-group">
                <label for="files">Прикрепить файлы</label>
                <input type="file" name="files" id="files" class="form-control" multiple>
                <small style="color: var(--gray-500);">Можно выбрать несколько файлов</small>
            </div>

            <div class="flex-between gap-10 mt-15">
                <button type="submit" class="btn btn-primary">✅ Создать заявку</button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
